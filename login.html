<!DOCTYPE html>
<html lang="ps" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ننوتل - AWCC سیستم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <!-- HEADER -->
    <div id="header"></div>
    <!-- LOGIN -->
    <section class="login-container">
        <div class="login-box">

            <div class="login-header">
                <h1>سیستم ته ننوتل</h1>
                <p>خپل حساب ته ننوځئ</p>
            </div>

            <form class="login-form" id="loginForm">

                <div class="form-group">
                    <label for="username">یوزر نوم</label>
                    <input type="text" id="username" placeholder="یوزر نوم" required>
                </div>

                <div class="form-group">
                    <label for="password">پټنوم</label>
                    <input type="password" id="password" placeholder="پټنوم" required>
                </div>

                <div class="form-group">
                    <label>
<input type="checkbox" id="rememberMe"> زه یاد وساتم
</label>
                </div>

                <button type="submit" class="btn btn-primary">ننوتل</button>

            </form>

            <div class="login-footer">
                <p><a href="#">پټنوم مو هیر شوی؟</a></p>
                <p>حساب نلرئ؟ <a href="./signup.html">نوم لیکنه</a></p>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="login.js"></script>
    <script src="js/include.js"></script>

</body>

</html>
